services:
  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://md_converter:md_converter@postgres:5432/md_converter
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_ENDPOINT_URL: http://localhost:9000
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - minio

  worker-preflight:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    command: uv run celery -A app.celery_app.celery_app worker -Q preflight --loglevel=INFO
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://md_converter:md_converter@postgres:5432/md_converter
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_ENDPOINT_URL: http://localhost:9000
    depends_on:
      - api
      - redis

  worker-layout:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    command: uv run celery -A app.celery_app.celery_app worker -Q layout --loglevel=INFO
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://md_converter:md_converter@postgres:5432/md_converter
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      - api
      - redis

  worker-fast:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    command: uv run celery -A app.celery_app.celery_app worker -Q fast --loglevel=INFO
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://md_converter:md_converter@postgres:5432/md_converter
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      - api
      - redis

  worker-ocr:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    command: uv run celery -A app.celery_app.celery_app worker -Q ocr --loglevel=INFO --concurrency=1
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://md_converter:md_converter@postgres:5432/md_converter
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      - api
      - redis

  worker-pptx:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    command: uv run celery -A app.celery_app.celery_app worker -Q pptx --loglevel=INFO
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://md_converter:md_converter@postgres:5432/md_converter
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      - api
      - redis

  worker-merge:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    command: uv run celery -A app.celery_app.celery_app worker -Q merge,cleanup --loglevel=INFO
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://md_converter:md_converter@postgres:5432/md_converter
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      - api
      - redis

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: md_converter
      POSTGRES_USER: md_converter
      POSTGRES_PASSWORD: md_converter
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
